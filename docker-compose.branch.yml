services:
  havesh-silo:
    image: ${REGISTRY:-185.227.66.72:5000}/haveshsilo:latest
    container_name: havesh-silo-${BranchName}
    build:
      context: .
      dockerfile: Havesh.Silo/Dockerfile
    env_file:
      - ${ENV_FILE:?ENV_FILE is required}
    environment:
      - VIRTUAL_HOST=
      - VIRTUAL_PORT=
      - LETSENCRYPT_HOST=
      - LETSENCRYPT_EMAIL=
    entrypoint: ["/bin/bash", "-c", "until bash -c '(echo >/dev/tcp/sql2019/1433) 2>/dev/null'; do echo 'Waiting for SQL Server...'; sleep 3; done; echo 'SQL ready. Starting silo...'; sleep 5; dotnet Havesh.Silo.dll"]
    ports:
      - "${SILO_PORT}:8081"
      - "${SILO_DASHBOARD_PORT}:8082"
    networks:
      - shared-network
    restart: unless-stopped

  havesh-app:
    image: ${REGISTRY:-185.227.66.72:5000}/haveshapp:latest
    container_name: havesh-app-${BranchName}
    build:
      context: .
      dockerfile: HaveshApp/Dockerfile
    env_file:
      - ${ENV_FILE:?ENV_FILE is required}
    ports:
      - "${APP_PORT}:80"
    networks:
      - shared-network
    restart: unless-stopped
    depends_on:
      - havesh-silo

networks:
  shared-network:
    external: true
